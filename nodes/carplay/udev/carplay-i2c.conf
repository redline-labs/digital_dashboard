# The MFi coprocessor is reached through the kernel's I2C layer on Linux.
#
# hid_mcp2221 binds the MCP2221A bridge and registers it as an I2C adapter;
# i2c-dev then exposes that adapter as /dev/i2c-N. Neither is loaded on demand
# by anything in this project, so ask for them explicitly.
#
# Install:
#   sudo cp nodes/carplay/udev/carplay-i2c.conf /etc/modules-load.d/
#
# NOTE: if an older bring-up left /etc/modprobe.d/blacklist-hid-mcp2221.conf in
# place, remove it -- that blacklist exists to keep hid_mcp2221 *off* the chip
# for the hidapi backend, and it will prevent the I2C adapter from appearing.
hid_mcp2221
i2c-dev
