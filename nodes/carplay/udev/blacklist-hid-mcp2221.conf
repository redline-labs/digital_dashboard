# The in-kernel hid_mcp2221 driver binds the MCP2221A and re-exports it as an
# I2C/GPIO/hwmon device through industrialio. It never asks HID core for a
# HIDRAW connection, so no /dev/hidraw node is created and hidapi's hidraw
# backend cannot open the chip at all.
#
# We drive the bridge from userspace (libs/mcp2221a), so keep this driver out of
# the way and let hid-generic bind instead -- that one does create hidraw.
#
# Install:
#   sudo cp nodes/carplay/udev/blacklist-hid-mcp2221.conf /etc/modprobe.d/
#   sudo modprobe -r hid_mcp2221
blacklist hid_mcp2221
