name: "carplay"
width: 1000
height: 600
background_color: "#555555"
widgets:
  - type: carplay
    x: 0
    y: 0
    width: 800
    height: 600
    config:
      # Zenoh keys published/subscribed by the carplay driver node
      # (nodes/carplay). Only override these if the driver was started
      # with a non-default --key-prefix.
      video_key: "nodes/carplay/video"
      audio_key: "nodes/carplay/audio"
      mic_key: "nodes/carplay/mic"
      input_key: "nodes/carplay/input"
      session_key: "nodes/carplay/session"

  # Supplemental widget fed by the same driver node -- demonstrates that
  # CarPlay metadata is reusable outside the projected video surface.
  - type: now_playing
    x: 810
    y: 20
    width: 180
    height: 120
    config:
      zenoh_key: "nodes/carplay/nowplaying"
      show_album_art: true
      show_progress: true
